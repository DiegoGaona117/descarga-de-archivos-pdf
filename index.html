    <style>
        * {

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            min-height: 100vh;

            background: linear-gradient(135deg, #d32f2f, #c62828);
            color: white;

            border-radius: 10px 10px 0 0;

<body>
    <div class="container">
        <h1>Muchas gracias por adquirir tu paquete de ejercicios PDF</h1>
        
        <div class="success-message">¡Bien hecho!</div>
        
        <div class="instruction">
            Puedes acceder a los documentos presionando el siguiente botón:
        </div>
        
        <div class="buttons-section">
            <a href="https://drive.google.com/drive/folders/1PFb6GxcGyqnwtgNtE0o-y3a1sNZByj2B?usp=sharing" target="_blank" class="btn">Ver mi paquete de planos</a>
        </div>
        
        <div class="video-section">
            <div class="video-header">¿Cómo descargar el Paquete?</div>
            <div class="video-container">
                <iframe width="100%" height="315" src="https://www.youtube.com/embed/of0i-NhSq-M?si=8ZpyD84ZvuuC-SSL" 
                        title="¿Cómo descargar los archivos?" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen
                        style="border-radius: 10px;">
                </iframe>
            </div>
        </div>
        
        <div class="footer-note">
            Todos los recursos están disponibles las 24 horas. Si tienes problemas para acceder, no dudes en contactarnos.
        </div>
    </div>

    <script>
        const MAKE_WEBHOOK = 'https://hook.us1.make.com/fyli8y7tmxu6mtqf7byp9vy2g3cji3wa';

        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? decodeURIComponent(match[2]) : null;
        }

        function getFbc() {
            const fbclid = new URLSearchParams(window.location.search).get('fbclid');
            if (fbclid) return 'fb.1.' + Date.now() + '.' + fbclid;
            return getCookie('_fbc') || null;
        }

        async function getGeoData() {
            try {
                const res  = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                return {
                    client_ip:     data.ip             || null,
                    geo_ciudad:    data.city           || null,
                    geo_region:    data.region         || null,
                    geo_pais:      data.country_name   || null,
                    geo_pais_code: data.country        || null,
                    geo_cp:        data.postal         || null,
                    geo_lat:       data.latitude       || null,
                    geo_lng:       data.longitude      || null,
                };
            } catch (e) {
                return { client_ip: null, geo_ciudad: null, geo_region: null, geo_pais: null, geo_pais_code: null, geo_cp: null, geo_lat: null, geo_lng: null };
            }
        }

        async function firePurchaseEvent() {
            // Obtener el order_code de la pantalla de checkout
            const ORDER_CODE = localStorage.getItem('order_code') || 'PL-DESCONOCIDO';
            const EVENT_ID = ORDER_CODE;
            
            // 1. SIEMPRE se dispara el Pixel de Meta (cada vez que cargan esta página de gracias)
            if (typeof fbq === 'function') {
                fbq('track', 'Purchase', 
                    { value: 50, currency: 'MXN', order_id: ORDER_CODE },
                    { eventID: EVENT_ID }
                );
            }

            // 2. SOLO UNA VEZ se dispara el Webhook a Make (usando localStorage para evitar duplicados en el servidor)
            if (!localStorage.getItem('webhook_purchase_enviado')) {
                const fbp = getCookie('_fbp') || null;
                const fbc = getFbc();
                const geo = await getGeoData();

                fetch(MAKE_WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        evento: 'Purchase',
                        event_id: EVENT_ID,
                        order_code: ORDER_CODE,
                        timestamp: new Date().toISOString(),
                        producto: 'Paquete Planos',
                        valor: 50,
                        moneda: 'MXN',
                        fbp: fbp, 
                        fbc: fbc,
                        client_ip: geo.client_ip, 
                        client_user_agent: navigator.userAgent,
                        geo_ciudad: geo.geo_ciudad, 
                        geo_region: geo.geo_region,
                        geo_pais: geo.geo_pais, 
                        geo_pais_code: geo.geo_pais_code,
                        geo_cp: geo.geo_cp, 
                        geo_lat: geo.geo_lat, 
                        geo_lng: geo.geo_lng,
                    })
                }).then(() => {
                    // Si se envía con éxito, creamos esta variable para bloquear futuros envíos a Make
                    localStorage.setItem('webhook_purchase_enviado', 'true');
                    console.log('✅ Evento Purchase enviado a Make exitosamente');
                }).catch((error) => {
                    console.error('Error al enviar el Webhook:', error);
                });
            }
        }

        // Ejecutar la función de rastreo tan pronto como cargue el script
        firePurchaseEvent();
    </script>
