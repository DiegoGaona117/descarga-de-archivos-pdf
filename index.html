    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0f1419 0%, #1a2332 100%); min-height: 100vh; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .container { max-width: 1000px; width: 100%; text-align: center; }
        h1 { font-size: 2.5rem; margin-bottom: 2rem; font-weight: 300; line-height: 1.2; }
        .success-message { font-size: 1.2rem; margin-bottom: 1rem; color: #4CAF50; font-weight: bold; }
        .instruction { font-size: 1.1rem; margin-bottom: 3rem; opacity: 0.9; }
        .buttons-section { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 1rem; }
        .btn { padding: 15px 30px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; text-decoration: none; color: black; cursor: pointer; transition: all 0.3s ease; display: inline-block; min-width: 200px; background-color: yellow; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .video-section { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-top: 2rem; backdrop-filter: blur(10px); max-width: 650px; margin-left: auto; margin-right: auto; }
        .video-header { background: linear-gradient(135deg, #d32f2f, #c62828); color: white; padding: 15px; border-radius: 10px 10px 0 0; font-weight: bold; font-size: 1.1rem; }
        .video-container { position: relative; background: #f5f5f5; border-radius: 0 0 10px 10px; padding: 20px; display: flex; align-items: center; justify-content: center; }
        @media (max-width: 768px) { h1 { font-size: 1.8rem; } .btn { width: 100%; max-width: 300px; } }
        .footer-note { margin-top: 2rem; opacity: 0.7; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Muchas gracias por adquirir tu paquete de ejercicios PDF</h1>
        
        <div class="success-message">¡Bien hecho!</div>
        
        <div class="instruction">
            Puedes acceder a los documentos presionando el siguiente botón:
        </div>
        
        <div class="buttons-section">
            <a href="https://drive.google.com/drive/folders/1PFb6GxcGyqnwtgNtE0o-y3a1sNZByj2B?usp=sharing" target="_blank" class="btn">Ver mi paquete de planos</a>
        </div>
        
        <div class="video-section">
            <div class="video-header">¿Cómo descargar el Paquete?</div>
            <div class="video-container">
                <iframe width="100%" height="315" src="https://www.youtube.com/embed/of0i-NhSq-M?si=8ZpyD84ZvuuC-SSL" 
                        title="¿Cómo descargar los archivos?" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen
                        style="border-radius: 10px;">
                </iframe>
            </div>
        </div>
        
        <div class="footer-note">
            Todos los recursos están disponibles las 24 horas. Si tienes problemas para acceder, no dudes en contactarnos.
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://meta-capi.cursodiegogaona.workers.dev';

        // --- Helpers Funciones ---
        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? decodeURIComponent(match[2]) : null;
        }

        function getFbc() {
            const fbclid = new URLSearchParams(window.location.search).get('fbclid');
            if (fbclid) return 'fb.1.' + Date.now() + '.' + fbclid;
            return getCookie('_fbc') || null;
        }

        // Función central para enviar a Cloudflare Worker
        async function sendToWorker(payload) {
            try {
                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const json = await res.json();
                console.log(`✅ [Cloudflare] ${payload.evento} procesado:`, json);
            } catch (e) {
                console.error(`❌ [Cloudflare] Error enviando ${payload.evento}:`, e);
            }
        }

        // ─── LÓGICA DE EVENTOS (PIXEL + CAPI) ────────────────────────────────────────
        async function fireTrackingEvents() {
            // Obtenemos el order_code. Si no existe, usamos uno por defecto pero NO generamos uno nuevo.
            const ORDER_CODE = localStorage.getItem('order_code') || 'PL-DESCONOCIDO';
            
            const timestampNow = Date.now();
            
            // Datos compartidos para el servidor
            const serverPayloadBase = {
                order_code: ORDER_CODE,
                fbp: getCookie('_fbp') || null,
                fbc: getFbc(),
                source_url: window.location.href
            };

            // 1. EVENTO: PAGEVIEW (Por Sesión)
            if (!sessionStorage.getItem('gracias_visitado')) {
                sessionStorage.setItem('gracias_visitado', 'true');
                
                const EVENT_ID_PAGEVIEW = ORDER_CODE + '-PV-' + timestampNow;
                console.log('-----------------------------------');
                console.log(`📡 [Navegador] Enviando PageView -> event_id: ${EVENT_ID_PAGEVIEW}`);
                
                if (typeof fbq === 'function') {
                    fbq('track', 'PageView', {}, { eventID: EVENT_ID_PAGEVIEW });
                }
                
                await sendToWorker({
                    ...serverPayloadBase,
                    evento: 'PageView',
                    event_id: EVENT_ID_PAGEVIEW
                });
            } else {
                console.log('🛑 [Tracking] PageView omitido por recarga de página.');
            }


            // 2. EVENTO: PURCHASE (Único e irrepetible por Order Code)
            const compraKey = 'purchase_enviado_' + ORDER_CODE;
            
            if (!localStorage.getItem(compraKey) && ORDER_CODE !== 'PL-DESCONOCIDO') {
                // NOTA: Para Purchase, no usamos timestamp en el ID para que Meta 
                // deduplique estrictamente basado en la orden.
                const EVENT_ID_PURCHASE = ORDER_CODE + '-PUR'; 

                console.log('-----------------------------------');
                console.log(`💰 [Navegador] Enviando Purchase -> event_id: ${EVENT_ID_PURCHASE}`);
                
                if (typeof fbq === 'function') {
                    fbq('track', 'Purchase', 
                        { content_name: 'Paquete de Planos', value: 60, currency: 'MXN', order_id: ORDER_CODE }, 
                        { eventID: EVENT_ID_PURCHASE }
                    );
                }

                console.log(`💰 [Servidor] Enviando Purchase a Cloudflare...`);
                await sendToWorker({
                    ...serverPayloadBase,
                    evento: 'Purchase',
                    event_id: EVENT_ID_PURCHASE,
                    producto: 'Paquete de Planos',
                    valor: 60,
                    moneda: 'MXN'
                });
                
                // Marcamos esta orden como comprada para SIEMPRE
                localStorage.setItem(compraKey, 'true');
                console.log('-----------------------------------');
            } else {
                console.log(`🛑 [Tracking] Purchase omitido. La orden ${ORDER_CODE} ya fue registrada anteriormente o es desconocida.`);
            }
        }

        // Ejecutar los eventos al cargar la página
        window.addEventListener('load', fireTrackingEvents);
    </script>
</body>
